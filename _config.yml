# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Cherif A. TENGA
first_name: Cherif A.
middle_name:
last_name: TENGA
email: tengacherif@gmail.com
description: >
  Étudiant en Data Science & AI Engineering à l'École Polytechnique de Lomé.
  Passionné par la donnée et les systèmes intelligents.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with
  <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.

icon: ⚡

url: https://cherif-tg.github.io
baseurl:
last_updated: true
impressum_path:

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: true
  theme_light: flat
  theme_dark: gitdimmed

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------
rss_icon: true

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: false
search_enabled: true
socials_in_navbar: false

nav_bar:
  - name: About
    permalink: /
  - name: Projects
    permalink: /projects/
  - name: CV
    permalink: /cv/
  - name: Blog
    permalink: /blog/
# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------

serve_og_meta: true
serve_schema_org: true
og_image:

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------

github_username: cherif-tg
linkedin_username: cherif-tenga-070089323
twitter_username:
instagram_username:
youtube_username:
discord_id:
zotero_username:
scholar_userid:
orcid_id:
medium_username:
quora_username:
publons_id:
research_gate_profile:
blogger_url:
work_url:
keybase_username:
wikidata_id:
dblp_url:
stackoverflow_id:
kaggle_id:
lastfm_id:
spotify_id:

# -----------------------------------------------------------------------------
# Analytics and search engine verification
# -----------------------------------------------------------------------------

google_analytics:
cronitor_analytics:
pirsch_analytics:
openpanel_analytics:
google_site_verification:
bing_site_verification:

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name: Cherif's Notes
blog_description: Réflexions sur la Data, l'IA et ce que je construis
permalink: /blog/:year/:title/
lsi: false
future: false
markdown: kramdown

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

enable_project_categories: true

announcements:
  enabled: false
  scrollable: true
  limit: 5

latest_posts:
  enabled: true
  scrollable: true
  limit: 3

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

sass:
  style: compressed

plugins:
  - jekyll-archives
  - jekyll-diagrams
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll-rel-canonical
  - jekyll-scholar
  - jekyll-seo-tag
  - jekyll-shields-io
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jekyll-unfurl
  - jemoji

# -----------------------------------------------------------------------------
# Sitemap settings
# -----------------------------------------------------------------------------

defaults:
  - scope:
      path: assets
    values:
      sitemap: false

# -----------------------------------------------------------------------------
# jekyll-minifier
# -----------------------------------------------------------------------------

jekyll-minifier:
  exclude: ["robots.txt"]
  uglifier_args:
    harmony: true

# -----------------------------------------------------------------------------
# Jekyll Archives
# -----------------------------------------------------------------------------

jekyll-archives:
  enabled: [year, tags, categories]
  layouts:
    year: archive-year
    tag: archive-tag
    category: archive-category
  permalinks:
    year: /blog/:year/
    tag: /blog/tag/:name/
    category: /blog/category/:name/

display_tags: [RAG, LLM, DataScience, Python, AI]
display_categories: []

# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------

scholar:
  last_name: [TENGA]
  first_name: [Cherif, A.]
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"
  group_by: none
  group_order: descending

# -----------------------------------------------------------------------------
# Responsive WebP Images
# -----------------------------------------------------------------------------

imagemagick:
  enabled: false

# -----------------------------------------------------------------------------
# Optional features
# -----------------------------------------------------------------------------

toc:
  beginning: false

external_sources:
  - name: medium.com
  - name: wikipedia.org

# -----------------------------------------------------------------------------
# Comments
# -----------------------------------------------------------------------------

# Disqus comments (disable by default)
disqus_shortname:

# Giscus comments (disable by default)
# See https://giscus.app for setup instructions
giscus:
  repo: cherif-tg/cherif-tg.github.io
  repo_id:
  category: Comments
  category_id:
  mapping: title
  strict: 1
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  theme: preferred_color_scheme
  lang: fr

# -----------------------------------------------------------------------------
# Jekyll settings (encoding etc.)
# -----------------------------------------------------------------------------

encoding: "utf-8"
highlighter: rouge


tikzjax: false
typograms: false
mermaid:
  enabled: true
chart:
  enabled: false
vega:
  enabled: false
math:
  enabled: true

# -----------------------------------------------------------------------------
# Jekyll Link Attributes
# -----------------------------------------------------------------------------

external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank
  exclude:

# -----------------------------------------------------------------------------
# Exclude from processing
# -----------------------------------------------------------------------------

exclude:
  - bin/
  - CONTRIBUTING.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - vendor

include:
  - _pages

# -----------------------------------------------------------------------------
# Plug-in settings
# -----------------------------------------------------------------------------

paginate: 4
paginate_path: /blog/page:num/
